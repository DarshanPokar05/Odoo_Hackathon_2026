openapi: 3.0.0
info:
  title: AssetFlow API
  version: 1.0.0
  description: API Documentation for AssetFlow Enterprise Asset & Resource Management System
servers:
  - url: http://localhost:3000/api/v1
    description: Development Server
paths:
  /auth/register:
    post:
      summary: Register a new employee
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                password:
                  type: string
                departmentId:
                  type: string
      responses:
        '201':
          description: Registration successful
  /auth/login:
    post:
      summary: Login to AssetFlow
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
  /auth/refresh:
    post:
      summary: Refresh JWT token
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Token refreshed
  /auth/forgot-password:
    post:
      summary: Forgot password
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
      responses:
        '200':
          description: Request sent
  /auth/reset-password:
    post:
      summary: Reset password
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                newPassword:
                  type: string
      responses:
        '200':
          description: Password reset successful
  /auth/logout:
    post:
      summary: Logout
      tags: [Authentication]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful

  /organization/departments:
    get:
      summary: Get all departments
      tags: [Organization]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
    post:
      summary: Create a department
      tags: [Organization]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                code:
                  type: string
      responses:
        '201':
          description: Created
  /organization/departments/{id}:
    get:
      summary: Get a department
      tags: [Organization]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
    patch:
      summary: Update a department
      tags: [Organization]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                status:
                  type: string
      responses:
        '200':
          description: Updated
    delete:
      summary: Deactivate a department
      tags: [Organization]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deactivated

  /users:
    get:
      summary: Get employee directory
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
    post:
      summary: Create an employee (Admin only)
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: Created
  /users/{id}/role:
    patch:
      summary: Assign a role to an employee
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                roleId:
                  type: string
      responses:
        '200':
          description: Role assigned
  /users/me:
    get:
      summary: Get own profile
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile retrieved

  /resources:
    get:
      summary: Get all bookable resources
      tags: [Resources]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Resources retrieved successfully
    post:
      summary: Create a new resource (Admin only)
      tags: [Resources]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                resourceType:
                  type: string
                capacity:
                  type: integer
                location:
                  type: string
      responses:
        '201':
          description: Resource created successfully
  /resources/available:
    get:
      summary: Get available resources for a given time slot (BOOK-007)
      tags: [Resources]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: startTime
          required: true
          schema:
            type: string
        - in: query
          name: endTime
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Available resources retrieved successfully
  /resources/{id}:
    get:
      summary: Get resource details
      tags: [Resources]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Resource details retrieved
    patch:
      summary: Update a resource
      tags: [Resources]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Resource updated
    delete:
      summary: Delete a resource
      tags: [Resources]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Resource deleted
  /resources/{id}/calendar:
    get:
      summary: Get calendar bookings for a resource (BOOK-006)
      tags: [Resources]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Calendar retrieved successfully

  /bookings:
    post:
      summary: Book a resource (BOOK-001)
      tags: [Bookings]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceId:
                  type: string
                startTime:
                  type: string
                endTime:
                  type: string
                purpose:
                  type: string
      responses:
        '201':
          description: Booking created successfully
    get:
      summary: Get bookings with pagination, filtering, and sorting (BOOK-002)
      tags: [Bookings]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Bookings retrieved successfully
  /bookings/{id}:
    get:
      summary: Get booking details (BOOK-003)
      tags: [Bookings]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Booking details retrieved
    patch:
      summary: Reschedule/Update booking (BOOK-004)
      tags: [Bookings]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Booking updated successfully
  /bookings/{id}/cancel:
    patch:
      summary: Cancel booking (BOOK-005)
      tags: [Bookings]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Booking cancelled successfully

  /reports/assets:
    get:
      summary: Get Asset Utilization Report
      tags: [Reports]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
  /reports/allocations:
    get:
      summary: Get Allocation Report
      tags: [Reports]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
  /reports/maintenance:
    get:
      summary: Get Maintenance Report
      tags: [Reports]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
  /reports/bookings:
    get:
      summary: Get Booking Report
      tags: [Reports]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
  /reports/audits:
    get:
      summary: Get Audit Report
      tags: [Reports]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
  /reports/export/csv:
    get:
      summary: Export Assets CSV
      tags: [Reports]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: CSV Stream
  /reports/export/excel:
    get:
      summary: Export Assets Excel
      tags: [Reports]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Excel Stream
  /reports/export/pdf:
    get:
      summary: Export Assets PDF
      tags: [Reports]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: PDF Stream

  /activity-logs:
    get:
      summary: Get Activity Logs (Admin)
      tags: [Activity Logs]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
  /activity-logs/export:
    get:
      summary: Export Activity Logs (Admin)
      tags: [Activity Logs]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: File Stream
  /activity-logs/{id}:
    get:
      summary: Get Activity Log By Id
      tags: [Activity Logs]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
  /users/{id}/activity:
    get:
      summary: Get user activity
      tags: [Activity Logs]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
  /assets/{id}/activity:
    get:
      summary: Get asset activity
      tags: [Activity Logs]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
